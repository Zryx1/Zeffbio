<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeff</title>
<style>
  /* ============================================================
     CARA GANTI FOTO PROFIL DAN LINK:
     Scroll ke bagian <script> paling bawah, cari "CONFIG".
     Tinggal ganti value di dalam tanda kutip "..." nya saja.
     Untuk foto profil dari catbox.moe, upload filenya di
     https://catbox.moe/ lalu copy link hasilnya ke avatarUrl.
     Background sudah pakai efek glow ungu-hitam bawaan CSS,
     tidak perlu link video lagi.
     ============================================================ */

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #000;
    overflow-x: hidden;
  }

  #bgRoot {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    overflow: hidden;
    background: #050005;
  }

  .bg-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .bg-wrap video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6) saturate(1.05);
  }

  .particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    bottom: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,140,255,0.95), rgba(150,60,255,0.1) 70%);
    animation-name: particle-rise;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
  }

  @keyframes particle-rise {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: var(--maxop, 1); }
    90% { opacity: calc(var(--maxop, 1) * 0.6); }
    100% { transform: translateY(-110vh) translateX(var(--drift, 20px)); opacity: 0; }
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(120,40,200,0.14), transparent 70%),
      linear-gradient(180deg, rgba(3,0,7,0.55) 0%, rgba(3,0,7,0.72) 45%, rgba(0,0,0,0.94) 100%);
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 32px;
  }

  .avatar-ring {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 180deg, #b04dff, #7a2cff, #d63dff, #b04dff);
    box-shadow: 0 0 24px rgba(160,70,255,0.55), 0 0 50px rgba(120,30,220,0.3);
    animation: spin 6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #0a0a0f;
    overflow: hidden;
    animation: unspin 6s linear infinite;
  }

  @keyframes unspin {
    to { transform: rotate(-360deg); }
  }

  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .name-row {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .name {
    position: relative;
    display: inline-block;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #fff;
    text-shadow: 0 0 12px rgba(160,70,255,0.55);
  }

  .name::before,
  .name::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    background: transparent;
    overflow: hidden;
  }

  .name::before {
    color: #ff3dd6;
    z-index: -1;
    animation: glitch-1 4.5s infinite linear alternate-reverse;
  }

  .name::after {
    color: #7a2cff;
    z-index: -1;
    animation: glitch-2 3.8s infinite linear alternate-reverse;
  }

  @keyframes glitch-1 {
    0%, 88%, 100% { transform: translate(0, 0); clip-path: inset(0 0 0 0); opacity: 0; }
    89% { transform: translate(-3px, 1px); clip-path: inset(10% 0 60% 0); opacity: 0.85; }
    90% { transform: translate(2px, -1px); clip-path: inset(55% 0 15% 0); opacity: 0.85; }
    91% { transform: translate(-2px, 0); clip-path: inset(20% 0 40% 0); opacity: 0.85; }
    92% { transform: translate(0, 0); clip-path: inset(0 0 0 0); opacity: 0; }
  }

  @keyframes glitch-2 {
    0%, 91%, 100% { transform: translate(0, 0); clip-path: inset(0 0 0 0); opacity: 0; }
    92% { transform: translate(3px, -1px); clip-path: inset(65% 0 5% 0); opacity: 0.85; }
    93.5% { transform: translate(-2px, 1px); clip-path: inset(5% 0 70% 0); opacity: 0.85; }
    95% { transform: translate(2px, 0); clip-path: inset(35% 0 30% 0); opacity: 0.85; }
    96% { transform: translate(0, 0); clip-path: inset(0 0 0 0); opacity: 0; }
  }

  /* --- Realistic scalloped "verified" badge --- */
  .badge-real {
    position: relative;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 4px rgba(29,155,240,0.6));
  }

  .badge-real .lobe {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 40%;
    top: 50%;
    left: 50%;
    background: linear-gradient(135deg, #6fdcff, #1d9bf0 65%);
  }

  .badge-real .lobe:nth-child(1) { transform: translate(-50%,-50%) rotate(0deg) translateY(-5px) rotate(0deg); }
  .badge-real .lobe:nth-child(2) { transform: translate(-50%,-50%) rotate(45deg) translateY(-5px) rotate(-45deg); }
  .badge-real .lobe:nth-child(3) { transform: translate(-50%,-50%) rotate(90deg) translateY(-5px) rotate(-90deg); }
  .badge-real .lobe:nth-child(4) { transform: translate(-50%,-50%) rotate(135deg) translateY(-5px) rotate(-135deg); }
  .badge-real .lobe:nth-child(5) { transform: translate(-50%,-50%) rotate(180deg) translateY(-5px) rotate(-180deg); }
  .badge-real .lobe:nth-child(6) { transform: translate(-50%,-50%) rotate(225deg) translateY(-5px) rotate(-225deg); }
  .badge-real .lobe:nth-child(7) { transform: translate(-50%,-50%) rotate(270deg) translateY(-5px) rotate(-270deg); }
  .badge-real .lobe:nth-child(8) { transform: translate(-50%,-50%) rotate(315deg) translateY(-5px) rotate(-315deg); }

  .badge-real .core {
    position: absolute;
    inset: 2.5px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 26%, #7fe3ff, #1d9bf0 50%, #0b6fa8);
    box-shadow: 0 0 6px rgba(29,155,240,0.85), inset 0 0 4px rgba(255,255,255,0.45), inset 0 -1px 2px rgba(0,0,0,0.25);
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .badge-real .core svg { width: 9px; height: 9px; filter: drop-shadow(0 0.5px 0.5px rgba(0,0,0,0.4)); }

  .tagline {
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  .links {
    width: 100%;
    max-width: 340px;
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .link-btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 13px 16px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(160,70,255,0.06));
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.15),
      inset 0 0 0 1px rgba(160,70,255,0.06),
      0 6px 18px rgba(0,0,0,0.35);
    text-decoration: none;
    color: #fff;
    font-size: 13.5px;
    font-weight: 600;
    overflow: hidden;
    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .link-btn:hover {
    background: linear-gradient(135deg, rgba(255,255,255,0.16), rgba(160,70,255,0.12));
    border-color: rgba(255,255,255,0.3);
  }

  .icon {
    width: 27px;
    height: 27px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 2px 6px rgba(0,0,0,0.3);
  }

  .icon svg { width: 14px; height: 14px; }

  .icon.tiktok { background: linear-gradient(135deg, #2a2a2a, #000); }
  .icon.whatsapp { background: linear-gradient(135deg, #34e07a, #1fae53); }
  .icon.telegram { background: linear-gradient(135deg, #4fc3ff, #1f8fd1); }

  .chevron {
    margin-left: auto;
    opacity: 0.4;
  }

  .link-btn:active {
    transform: scale(0.97);
  }

  .sound-toggle {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 5;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(160,70,255,0.1));
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 14px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #fff;
  }

  .sound-toggle svg { width: 18px; height: 18px; }

  .footer {
    margin-top: 32px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-transform: lowercase;
  }
</style>
</head>
<body>

  <div id="bgRoot">
    <div class="bg-wrap" id="bgWrap"></div>
    <div class="particles" id="particles"></div>
    <div class="bg-overlay"></div>
  </div>

  <div class="page">
    <div class="avatar-ring">
      <div class="avatar-inner">
        <img id="avatarImg" src="" alt="avatar">
      </div>
    </div>

    <div class="name-row">
      <span class="name" id="nameText"></span>
      <span class="badge-real">
        <span class="lobe"></span><span class="lobe"></span><span class="lobe"></span><span class="lobe"></span>
        <span class="lobe"></span><span class="lobe"></span><span class="lobe"></span><span class="lobe"></span>
        <span class="core">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 12.5l2 2 4-4.5" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </span>
    </div>

    <div class="tagline">Contact Me</div>

    <div class="links" id="linksWrap"></div>

    <div class="footer" id="footerText"></div>
  </div>

  <button id="soundToggle" class="sound-toggle" aria-label="Toggle sound"></button>

<script>
/* ============================================================
   CONFIG — GANTI SEMUA DI SINI SESUAI KEINGINAN KAMU
   ============================================================ */
const CONFIG = {
  // Nama yang tampil (sudah diganti jadi "Zeff")
  name: "Zeff",

  // Foto profil (bulat). Ganti dengan link gambar kamu,
  // bisa dari catbox.moe juga, contoh:
  // "https://files.catbox.moe/xxxxxx.png"
  avatarUrl: "https://files.catbox.moe/vzosd5.jpg",

  // Teks kecil di paling bawah halaman
  footer: "zeff • 2026",

  // Video background (otomatis diputar, di-loop, tanpa suara).
  // Ganti link-nya kalau mau pakai video lain dari catbox.moe.
  videoUrl: "https://files.catbox.moe/mp3fu3.mp4",

  // Musik/suara background yang otomatis diputar saat halaman dibuka.
  // Ganti link-nya kalau mau pakai audio lain (bisa dari catbox.moe).
  // Kosongkan ("") kalau tidak mau ada suara sama sekali.
  soundUrl: "https://files.catbox.moe/qplcrh.mp3",

  // Daftar tombol link. Urutan di array = urutan tampil.
  // Kalau mau hapus salah satu, hapus seluruh blok { ... } nya.
  links: [
    {
      label: "TikTok",
      url: "https://tiktok.com/@zeffv12",
      icon: "tiktok"
    },
    {
      label: "WhatsApp",
      url: "https://wa.me/6285930242266",
      icon: "whatsapp"
    },
    {
      label: "Telegram",
      url: "https://t.me/@zeffmoon",
      icon: "telegram"
    }
  ]
};
/* ============================================================ */

const ICONS = {
  tiktok: `<svg viewBox="0 0 24 24" fill="#fff"><path d="M16.6 5.82s.51.5 0 0A4.278 4.278 0 0 1 15.54 3h-3.09v12.4a2.59 2.59 0 1 1-2.59-2.59c.17 0 .34.02.5.05V9.71a5.9 5.9 0 0 0-.5-.02 5.87 5.87 0 1 0 5.87 5.87V9.6a7.13 7.13 0 0 0 4.18 1.34V7.85a4.25 4.25 0 0 1-2.31-2.03z"/></svg>`,
  whatsapp: `<svg viewBox="0 0 24 24" fill="#fff"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.28-1.38a9.87 9.87 0 0 0 4.71 1.2h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm5.8 14.06c-.24.68-1.39 1.3-1.93 1.38-.49.08-1.11.11-1.79-.11a16.6 16.6 0 0 1-1.62-.6c-2.86-1.24-4.72-4.13-4.86-4.32-.14-.19-1.17-1.55-1.17-2.96 0-1.4.73-2.09 1-2.38.26-.28.57-.35.76-.35.19 0 .38 0 .55.01.18.01.41-.07.64.49.24.58.81 2 .88 2.14.07.14.11.31.02.5-.09.19-.14.31-.28.47-.14.16-.29.36-.42.48-.14.14-.28.29-.12.57.16.28.71 1.17 1.53 1.9 1.05.94 1.94 1.23 2.22 1.37.28.14.44.12.6-.07.16-.19.68-.79.86-1.06.18-.28.36-.23.6-.14.24.09 1.55.73 1.82.86.26.14.44.2.5.32.07.11.07.65-.17 1.32z"/></svg>`,
  telegram: `<svg viewBox="0 0 24 24" fill="#fff"><path d="M21.94 3.36L18.6 20.24c-.25 1.1-.9 1.37-1.83.85l-5.06-3.73-2.44 2.35c-.27.27-.5.5-1.02.5l.36-5.14 9.35-8.45c.41-.36-.09-.56-.63-.2L6.1 12.9l-5.06-1.58c-1.1-.34-1.12-1.1.23-1.63L20.5 2.03c.92-.34 1.72.22 1.44 1.33z"/></svg>`
};

document.getElementById('nameText').textContent = CONFIG.name;
document.getElementById('nameText').setAttribute('data-text', CONFIG.name);
document.getElementById('footerText').textContent = CONFIG.footer;
document.getElementById('avatarImg').src = CONFIG.avatarUrl;

// background sound with autoplay + fallback for browsers that block it
if (CONFIG.soundUrl) {
  const audio = new Audio(CONFIG.soundUrl);
  audio.loop = true;
  audio.volume = 1.0;

  const toggleBtn = document.getElementById('soundToggle');
  const ICON_ON = `<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="#fff"/><path d="M16.5 8.5a5 5 0 0 1 0 7" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><path d="M19 6a9 9 0 0 1 0 12" stroke="#fff" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/></svg>`;
  const ICON_OFF = `<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4z" fill="#fff"/><path d="M15.5 9.5l5 5m0-5l-5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>`;

  const setIcon = (playing) => { toggleBtn.innerHTML = playing ? ICON_ON : ICON_OFF; };
  setIcon(false);

  const startAudio = () => {
    audio.muted = false;
    const p = audio.play();
    if (p && p.then) {
      p.then(() => setIcon(true)).catch(() => setIcon(false));
    }
  };

  // try to autoplay immediately; most mobile browsers will block this
  startAudio();

  // fallback: start on the very first tap/click anywhere on the page
  const unlockOnce = () => { startAudio(); };
  document.addEventListener('touchstart', unlockOnce, { once: true });
  document.addEventListener('click', unlockOnce, { once: true });

  toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (audio.paused) {
      startAudio();
    } else {
      audio.pause();
      setIcon(false);
    }
  });
} else {
  document.getElementById('soundToggle').style.display = 'none';
}

// background video (muted, looping) with autoplay + fallback for blocked autoplay
if (CONFIG.videoUrl) {
  const bgWrap = document.getElementById('bgWrap');
  const vid = document.createElement('video');
  vid.muted = true;
  vid.defaultMuted = true;
  vid.loop = true;
  vid.playsInline = true;
  vid.setAttribute('muted', '');
  vid.setAttribute('playsinline', '');
  vid.setAttribute('webkit-playsinline', '');
  vid.preload = 'auto';
  bgWrap.appendChild(vid);

  const tryPlayVideo = () => { const p = vid.play(); if (p && p.catch) p.catch(() => {}); };
  vid.addEventListener('loadeddata', tryPlayVideo);
  vid.src = CONFIG.videoUrl;
  vid.load();
  tryPlayVideo();

  document.addEventListener('touchstart', tryPlayVideo, { once: true });
  document.addEventListener('click', tryPlayVideo, { once: true });
}


const particlesWrap = document.getElementById('particles');
const PARTICLE_COUNT = 55;
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = 1.5 + Math.random() * 5;
  const left = Math.random() * 100;
  const duration = 8 + Math.random() * 16;
  const delay = Math.random() * -26;
  const drift = (Math.random() * 80 - 40).toFixed(0) + 'px';
  const opacity = (0.4 + Math.random() * 0.6).toFixed(2);
  p.style.width = size + 'px';
  p.style.height = size + 'px';
  p.style.left = left + '%';
  p.style.setProperty('--drift', drift);
  p.style.setProperty('--maxop', opacity);
  p.style.animationDuration = duration + 's';
  p.style.animationDelay = delay + 's';
  particlesWrap.appendChild(p);
}

const linksWrap = document.getElementById('linksWrap');
linksWrap.innerHTML = CONFIG.links.map(link => `
  <a class="link-btn" href="${link.url}" target="_blank" rel="noopener">
    <span class="icon ${link.icon}">${ICONS[link.icon] || ''}</span>
    <span>${link.label}</span>
    <span class="chevron">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </a>
`).join('');
</script>
</body>
</html>
